name: Deploy Malon Backend to VPS

on:
  push:
    branches:
      - main # Change this if your branch name is different

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy Backend via SSH
      uses: appleboy/ssh-action@master
      env:
        SERVER_ENV: ${{ secrets.ENV_FILE }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: SERVER_ENV
        script: |
          # 1. Create Web Directory if missing
          mkdir -p /var/www
          cd /var/www

          # 2. Check if the repo exists. If not, auto-clone it securely
          if [ ! -d "malon-suites-lakewood-server" ]; then
            git clone https://github.com/${{ github.repository }}.git
          fi
          
          # 3. Navigate directly into the cloned repository
          cd malon-suites-lakewood-server
          
          # 4. Pull the newest updates from GitHub
          git pull origin main
          
          # 3. Generate the hidden .env file from Secrets
          echo "$SERVER_ENV" > .env
          
          # 4. Install Node modules
          npm install
          
          # 5. Restart PM2!
          pm2 restart "malon-backend" || pm2 start index.js --name "malon-backend"
          pm2 save
